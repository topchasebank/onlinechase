        * { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .balance-hidden { filter: blur(8px); user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a1a1a1; }
        .notification-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .crash-overlay { animation: glitch 0.3s ease-in-out; }
        @keyframes glitch { 0%, 100% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(2px, -2px); } 60% { transform: translate(-2px, -2px); } 80% { transform: translate(2px, 2px); } }

        // ==================== TOAST NOTIFICATIONS ====================
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', warning: 'bg-yellow-500', info: 'bg-blue-500' };
            toast.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 slide-in flex items-center gap-2`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ==================== MODALS ====================
        function showModal(title, content, onConfirm = null, showCancel = true) {
            const modal = document.createElement('div');
            modal.id = 'active-modal';
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl max-w-md w-full fade-in">
                    <div class="p-6 border-b border-gray-200">
                        <h3 class="text-xl font-semibold text-gray-900">${title}</h3>
                    </div>
                    <div class="p-6">${content}</div>
                    <div class="p-6 border-t border-gray-200 flex gap-3 justify-end">
                        ${showCancel ? `<button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">${t('cancel')}</button>` : ''}
                        ${onConfirm ? `<button onclick="modalConfirm()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">${t('confirm')}</button>` : ''}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            window.modalConfirm = () => { closeModal(); if (onConfirm) onConfirm(); };
        }

        function closeModal() {
            const modal = document.getElementById('active-modal');
            if (modal) modal.remove();

            if (Storage.getLocked()) {
                showToast(t('accountLocked'), 'error');
                return;
            }
            
            if (username && password) {
                Storage.setLoggedIn(true);
                Storage.setLastView('dashboard');
                
                // Add login notification
                const notifications = Storage.getNotifications();
                notifications.unshift({
                    id: Date.now(),
                    title: t('newLogin'),
                    message: t('loginFromDevice'),
                    date: new Date().toISOString().split('T')[0],
                    read: false

                Storage.setNotifications(notifications);
                
                showToast(`${t('welcome')}, ${Storage.getName().split(' ')[0]}!`, 'success');

                render();

                                    <button onclick="unlockAccount()" class="flex-1 h-12 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                                        <i class="fas fa-unlock mr-2"></i>${t('unlockAccount')}
                                    </button>
                                </div>
                                ${Storage.getLocked() ? `<p class="mt-4 text-red-400 text-sm"><i class="fas fa-exclamation-triangle mr-2"></i>Account is currently LOCKED</p>` : ''}
                            </div>
                            
                            <div class="bg-gray-800 rounded-xl p-6">
                                <h3 class="text-lg font-semibold text-white mb-4">Edit Account Details</h3>
                                <div class="space-y-3">
                                    <input type="text" id="care-name" value="${Storage.getName()}" placeholder="Account Name" class="w-full h-10 px-3 bg-gray-700 text-white rounded border border-gray-600">
                                    <input type="text" id="care-dob" value="${Storage.getDOB()}" placeholder="Date of Birth" class="w-full h-10 px-3 bg-gray-700 text-white rounded border border-gray-600">
                                    <input type="number" id="care-balance" value="${Storage.getBalance()}" placeholder="Balance" class="w-full h-10 px-3 bg-gray-700 text-white rounded border border-gray-600">
                                    <button onclick="updateAccountDetails()" class="w-full h-10 bg-blue-600 text-white rounded hover:bg-blue-700">Update Details</button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Pending Transfers -->
                        <div class="bg-gray-800 rounded-xl overflow-hidden">
                            <div class="p-6 border-b border-gray-700">
                                <h3 class="text-lg font-semibold text-white">${t('pendingTransfers')} (${pending.length})</h3>
                            </div>
                            <div class="divide-y divide-gray-700">
                                ${pending.length === 0 ? `<p class="p-6 text-gray-400 text-center">No pending transfers</p>` : ''}
                                ${pending.map((transfer, index) => `
                                    <div class="p-4 flex items-center justify-between">
                                        <div>
                                            <p class="text-white font-medium">$${transfer.amount.toLocaleString()} to ${transfer.bank}</p>
                                            <p class="text-gray-400 text-sm">Account: ${transfer.account} | ${transfer.date}</p>
                                            <p class="text-gray-500 text-xs mt-1">${transfer.description}</p>
                                        </div>
                                        <div class="flex gap-2">
                                            <button onclick="approveTransfer(${index})" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">${t('approve')}</button>
                                            <button onclick="rejectTransfer(${index})" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">${t('reject')}</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </main>
                </div>
            `;
        }

        // ==================== ACTION FUNCTIONS ====================
        function toggleBalance() {
            showBalanceValue = !showBalanceValue;
            render();
        }

        function showProfileMenu() {
            currentView = 'settings';
            Storage.setLastView('settings');
            render();
        }

        function showNotifications() {
            const notifications = Storage.getNotifications();
            const content = `
                <div class="max-h-96 overflow-y-auto custom-scrollbar">
                    ${notifications.length === 0 ? '<p class="text-gray-500 text-center py-4">No notifications</p>' : ''}
                    ${notifications.map(n => `
                        <div class="p-4 border-b border-gray-200 ${n.read ? 'bg-white' : 'bg-blue-50'}">
                            <div class="flex items-start justify-between">
                                <div>
                                    <p class="font-medium text-gray-900">${n.title}</p>
                                    <p class="text-sm text-gray-600 mt-1">${n.message}</p>
                                    <p class="text-xs text-gray-400 mt-2">${n.date}</p>
                                </div>
                                ${!n.read ? '<span class="w-2 h-2 bg-blue-600 rounded-full"></span>' : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            showModal(t('notifications'), content, () => {
                // Mark all as read
                const updated = notifications.map(n => ({...n, read: true}));
                Storage.setNotifications(updated);
                render();
            });
        }

        function showSearch() {
            const content = `
                <div class="space-y-4">
                    <input type="text" id="search-input" placeholder="${t('search)}..." 
                        class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                        onkeyup="performSearch(this.value)">
                    <div id="search-results" class="max-h-64 overflow-y-auto custom-scrollbar"></div>
                </div>
            `;
            showModal(t('search'), content, null, false);
            setTimeout(() => document.getElementById('search-input').focus(), 100);
        }

        function performSearch(query) {
            const resultsDiv = document.getElementById('search-results');
            if (!query) {
                resultsDiv.innerHTML = '';
                return;
            }
            
            const history = Storage.getHistory();
            const matches = history.filter(h => 
                h.description.toLowerCase().includes(query.toLowerCase()) ||
                h.date.includes(query) ||
                h.amount.toString().includes(query)
            );
            
            resultsDiv.innerHTML = matches.length === 0 ? '<p class="text-gray-500 text-center py-4">No results found</p>' :
                matches.map(m => `
                    <div class="p-3 border-b border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="font-medium">${m.description}</p>
                            <p class="text-sm text-gray-500">${m.date}</p>
                        </div>
                        <span class="font-semibold ${m.type === 'credit' ? 'text-green-600' : 'text-red-600'}">
                            ${m.type === 'credit' ? '+' : ''}$${Math.abs(m.amount).toLocaleString()}
                        </span>
                    </div>
                `).join('');
        }

        function showFullHistory() {
            const history = Storage.getHistory();
            const content = `
                <div class="max-h-96 overflow-y-auto custom-scrollbar">
                    ${history.map(item => `
                        <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 ${item.type === 'credit' ? 'bg-green-100' : 'bg-red-100'} rounded-full flex items-center justify-center">
                                    <i class="fas ${item.type === 'credit' ? 'fa-arrow-down text-green-600' : 'fa-arrow-up text-red-600'}"></i>
                                </div>
                                <div>
                                    <p class="font-medium text-gray-900">${item.description}</p>
                                    <p class="text-sm text-gray-500">${item.date}</p>
                                </div>
                            </div>
                            <span class="font-semibold ${item.type === 'credit' ? 'text-green-600' : 'text-red-600'}">
                                ${item.type === 'credit' ? '+' : ''}$${Math.abs(item.amount).toLocaleString('en-US', {minimumFractionDigits: 2})}
                            </span>
                        </div>
                    `).join('')}
                </div>
            `;
            showModal('Transaction History', content, null, false);
        }

        function showTransferModal() {
            if (Storage.getLocked()) {
                showToast(t('accountLocked'), 'error');
                return;
            }
            
            const banks = ['Bank of America', 'Wells Fargo', 'Citibank', 'US Bank', 'PNC Bank', 'Capital One', 'TD Bank', 'Truist'];
            const content = `
                <form id="transfer-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">${t('from')}</label>
                        <select class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                            <option>Checking Account (****${Storage.getAccountNumber().slice(-4)})</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">${t('to')} - Bank</label>
                        <select id="transfer-bank" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                            ${banks.map(b => `<option value="${b}">${b}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Account Number</label>
                        <input type="text" id="transfer-account" placeholder="Enter account number" 
                            class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">${t('amount')}</label>
                        <input type="number" id="transfer-amount" placeholder="0.00" step="0.01"
                            class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">${t('description')}</label>
                        <input type="text" id="transfer-desc" placeholder="Optional description"
                            class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                    </div>
                </form>
            `;
            showModal(t('transferMoney'), content, () => {
                const bank = document.getElementById('transfer-bank').value;
                const account = document.getElementById('transfer-account').value;
                const amount = parseFloat(document.getElementById('transfer-amount').value);
                const desc = document.getElementById('transfer-desc').value || 'Transfer';
                
                if (!account || !amount || amount <= 0) {
                    showToast('Please fill all fields correctly', 'error');
                    return;
                }
                
                if (amount > Storage.getBalance()) {
                    showToast('Insufficient funds', 'error');
                    return;
                }
                
                closeModal();
                setTimeout(() => requestTransferPIN(bank, account, amount, desc), 100);
            });
        }

        function requestTransferPIN(bank, account, amount, desc) {
            const content = `
                <div class="text-center">
                    <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-lock text-blue-600 text-2xl"></i>
                    </div>
                    <p class="text-gray-600 mb-4">${t('enterPIN')}</p>
                    <input type="password" id="transfer-pin-input" maxlength="4" placeholder="****"
                        class="w-full h-12 px-4 text-center text-2xl tracking-widest border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                </div>
            `;
            showModal(t('transferPIN'), content, () => {
                const pin = document.getElementById('transfer-pin-input').value;
                if (pin === transferPIN) {
                    // Add to pending transfers
                    const pending = Storage.getPendingTransfers();
                    pending.push({
                        bank, account, amount, description: desc,
                        date: new Date().toISOString().split('T')[0],
                        id: Date.now()
                    });
                    Storage.setPendingTransfers(pending);
                    
                    // Add notification
                    const notifications = Storage.getNotifications();
                    notifications.unshift({
                        id: Date.now(),
                        title: t('newTransfer'),
                        message: t('transferRequiresApproval'),
                        date: new Date().toISOString().split('T')[0],
                        read: false
                    });
                    Storage.setNotifications(notifications);
                    
                    showToast(t('transferPending'), 'warning');
                    closeModal();
                } else {
                    showToast(t('invalidPIN'), 'error');
                }
            });
            setTimeout(() => document.getElementById('transfer-pin-input').focus(), 100);
        }

        function showPayBillModal() {
            if (Storage.getLocked()) {
                showToast(t('accountLocked'), 'error');
                return;
            }
            showToast(t('featureUnavailable'), 'warning');
        }

        function showDepositModal() {
            if (Storage.getLocked()) {
                showToast(t('accountLocked'), 'error');
                return;
            }
            showToast(t('featureUnavailable'), 'warning');
        }

        function showPaymentMethods() {
            const methods = Storage.getPaymentMethods();
            const content = `
                <div class="space-y-4">
                    ${methods.map(m => `
                        <div class="flex items-center justify-between p-4 border border-gray-200 rounded-lg">
                            <div class="flex items-center gap-3">
                                <i class="fab fa-${m.type === 'bitcoin' ? 'bitcoin text-orange-500' : m.type === 'paypal' ? 'paypal text-blue-600' : 'money-bill-wave text-green-600'} text-2xl"></i>
                                <div>
                                    <p class="font-medium">${m.name}</p>
                                    <p class="text-sm text-gray-500">${m.connected ? 'Connected' : 'Not connected'}</p>
                                </div>
                            </div>
                            <button onclick="togglePaymentMethod(${m.id})" class="px-3 py-1 ${m.connected ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'} rounded-full text-sm">
                                ${m.connected ? 'Connected' : 'Connect'}
                            </button>
                        </div>
                    `).join('')}
                    <div class="pt-4 border-t border-gray-200">
                        <button onclick="showAddCardModal()" class="w-full h-12 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                            <i class="fas fa-plus mr-2"></i>${t('addCard')}
                        </button>
                    </div>
                </div>
            `;
            showModal('Payment Methods', content, null, false);
        }

        function togglePaymentMethod(id) {
            const methods = Storage.getPaymentMethods();
            const method = methods.find(m => m.id === id);
            if (method) {
                method.connected = !method.connected;
                Storage.setPaymentMethods(methods);
                showPaymentMethods();
            }
        }

        function showAddCardModal() {
            closeModal();
            const content = `
                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">${t('cardNumber')}</label>
                        <input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19"
                            class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">${t('expiryDate')}</label>
                            <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5"
                                class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">${t('cvv')}</label>
                            <input type="password" id="card-cvv" placeholder="***" maxlength="3"
                                class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                        </div>
                    </div>
                </form>
            `;
            showModal(t('addCard'), content, () => {
                showToast(t('cardAdded'), 'success');
                closeModal();
            });
        }

        function saveSettings() {
            const name = document.getElementById('settings-name').value;
            const email = document.getElementById('settings-email').value;
            const phone = document.getElementById('settings-phone').value;
            const address = document.getElementById('settings-address').value;
            
            if (name) Storage.setName(name);
            if (email) Storage.setEmail(email);
            if (phone) Storage.setPhone(phone);
            if (address) Storage.setAddress(address);
            
            showToast('Settings saved successfully', 'success');
            currentView = 'dashboard';
            Storage.setLastView('dashboard');
            render();
        }

        function lockAccount() {
            Storage.setLocked(true);
            showToast('Account has been locked', 'success');
            render();
        }

        function unlockAccount() {
            Storage.setLocked(false);
            showToast('Account has been unlocked', 'success');
            render();
        }

        function updateAccountDetails() {
            const name = document.getElementById('care-name').value;
            const dob = document.getElementById('care-dob').value;
            const balance = parseFloat(document.getElementById('care-balance').value);
            
            if (name) Storage.setName(name);
            if (dob) Storage.setDOB(dob);
            if (!isNaN(balance)) Storage.setBalance(balance);
            
            showToast('Account details updated', 'success');
            render();
        }

        function approveTransfer(index) {
            const pending = Storage.getPendingTransfers();
            const transfer = pending[index];
            
            if (transfer) {
                // Deduct from balance
                const currentBalance = Storage.getBalance();
                Storage.setBalance(currentBalance - transfer.amount);
                
                // Add to history
                const history = Storage.getHistory();
                history.unshift({
                    date: new Date().toISOString().split('T')[0],
                    description: `Transfer to ${transfer.bank} (*${transfer.account.slice(-4)})`,
                    amount: -transfer.amount,
                    type: 'debit'
                });
                Storage.setHistory(history);
                
                // Remove from pending
                pending.splice(index, 1);
                Storage.setPendingTransfers(pending);
                
                showToast(t('transferApproved'), 'success');
                render();
            }
        }

        function rejectTransfer(index) {
            const pending = Storage.getPendingTransfers();
            pending.splice(index, 1);
            Storage.setPendingTransfers(pending);
            showToast(t('transferRejected'), 'info');
            render();
        }

        // ==================== MAIN RENDER ====================
        function render() {
            const app = document.getElementById('app');
            if (!app) return;
            
            Storage.setLastView(currentView);
            
            switch(currentView) {
                case 'login':
                    renderLogin(app);
                    break;
                case 'dashboard':
                    renderDashboard(app);
                    break;
                case 'settings':
                    renderSettings(app);
                    break;
                case 'customercare':
                    renderCustomerCare(app);
                    break;
                default:
                    renderDashboard(app);
            }
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            initializeData();
            checkSession();
            render();
        });
    </script>
</body>
</html>
